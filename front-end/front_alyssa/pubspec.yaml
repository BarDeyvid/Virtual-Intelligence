name: alyssa
description: A Flutter Chatbot Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  cupertino_icons: ^1.0.2
  flutter_launcher_icons: ^0.13.1
  window_manager: ^0.5.1
  flutter_markdown_plus: ^1.0.5   # ou a última versão disponível
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/icon/
    - assets/icon/alyssa.png
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"